apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: taskapp

spec:

  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

      - name: backend

        image: abhinav-23bcs181-backend

        ports:

        - containerPort: 3001

        env:

        - name: DATABASE_URL

          value: postgresql://user:password@postgres:5432/taskdb?schema=public
