name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose

    - name: Build with Docker Compose
      run: |
        docker-compose build

    - name: Test Docker Compose (Optional)
      run: |
        # Run in background and wait for healthcheck
        docker-compose up -d
        # Simple test to see if backend is up (after it should have initialised)
        sleep 30
        docker-compose ps
        docker-compose logs backend
        # Cleanup
        docker-compose down
